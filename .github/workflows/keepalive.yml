name: Keep Alive

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping deployed keepalive endpoint
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${APP_BASE_URL}" ]; then
            echo "::error::Missing GitHub repository variable APP_BASE_URL (e.g. https://your-app.vercel.app)"
            exit 1
          fi

          KEEPALIVE_URL="${APP_BASE_URL%/}/api/keepalive"
          echo "Pinging: ${KEEPALIVE_URL}"

          # Print response headers and body; fail the job on HTTP errors.
          curl --fail --show-error --silent \
            --dump-header /tmp/keepalive-headers.txt \
            --output /tmp/keepalive-body.txt \
            "${KEEPALIVE_URL}"

          echo "=== Response Headers ==="
          cat /tmp/keepalive-headers.txt
          echo "=== Response Body ==="
          cat /tmp/keepalive-body.txt
